services:
  - type: web
    name: telugu-ocr-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p models

      echo "Downloading craft model..."
      curl -L -o models/craft_mlt_25k.pth "https://drive.google.com/file/d/1o-zrNO7WvHNrj2v5QGlJJ-VN7s-RHCAL/view?usp=sharing"

      echo "Downloading english model..."
      curl -L -o models/english_g2.pth "https://drive.google.com/file/d/12wfZGSLVXDqSwLjjAoUqBuCDo87xRKOW/view?usp=sharing"

      echo "Checking files..."
      ls -lh models
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
