services:
  - type: web
    name: telugu-ocr-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p models

      echo "Downloading craft model..."
      # Use gdown for reliable Google Drive downloads
      pip install gdown

      gdown "1o-zrNO7WvHNrj2v5QGlJJ-VN7s-RHCAL" -O models/craft_mlt_25k.pth

      echo "Downloading english model..."
      gdown "12wfZGSLVXDqSwLjjAoUqBuCDo87xRKOW" -O models/english_g2.pth

      echo "Checking files..."
      ls -lh models
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
