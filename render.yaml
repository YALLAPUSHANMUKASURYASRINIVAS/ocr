services:
  - type: web
    name: telugu-ocr-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      pip install gdown

      MODEL_DIR="/opt/render/.EasyOCR"
      mkdir -p "$MODEL_DIR"

      echo "Downloading craft detector model..."
      gdown --fuzzy "https://drive.google.com/file/d/1o-zrNO7WvHNrj2v5QGlJJ-VN7s-RHCAL/view?usp=sharing" \
        -O "$MODEL_DIR/craft_mlt_25k.pth"

      echo "Downloading english recognition model..."
      gdown --fuzzy "https://drive.google.com/file/d/12wfZGSLVXDqSwLjjAoUqBuCDo87xRKOW/view?usp=sharing" \
        -O "$MODEL_DIR/english_g2.pth"

      echo "Model files:"
      ls -lh "$MODEL_DIR"

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
